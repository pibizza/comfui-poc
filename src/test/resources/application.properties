# Point REST client to WireMock
quarkus.rest-client.comfyui.url=http://localhost:18188

# Point WebSocket to the Quarkus test container (TestComfyUIWebSocketServer @ServerEndpoint("/ws"))
comfyui.host=localhost
comfyui.port=18189
comfyui.ws-timeout-seconds=5
comfyui.workflow-file=src/main/resources/comfyui-workflow.json

quarkus.http.test-port=18189
